<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Kappo Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --orange: #FF8C00;
            --orange-dim: rgba(255,140,0,0.12);
            --orange-glow: rgba(255,140,0,0.25);
            --red: #FF3B3B;
            --red-dim: rgba(255,59,59,0.12);
            --green: #00E07A;
            --green-dim: rgba(0,224,122,0.12);
            --bg: #0C0C0E;
            --surface: #111114;
            --surface2: #18181D;
            --surface3: #1F1F26;
            --border: rgba(255,255,255,0.06);
            --text: #FFFFFF;
            --muted: #5A5A6E;
            --sidebar-w: 280px;
        }

        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Banner de Alerta Crítico */
        #alertBanner {
            display: none;
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: var(--red);
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(255, 59, 59, 0.5);
            animation: pulseAlert 1s infinite;
        }

        @keyframes pulseAlert {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
            100% { transform: translateX(-50%) scale(1); }
        }

        .topnav { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 1000; }
        .brand { font-family: 'Rajdhani', sans-serif; font-weight: 700; color: var(--orange); text-transform: uppercase; letter-spacing: 2px; }

        .layout { flex: 1; display: flex; overflow: hidden; position: relative; }

        .sidebar { 
            width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; overflow-y: auto; 
        }

        .sidebar-section { padding: 15px; border-bottom: 1px solid var(--border); }
        .section-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }

        .alert-toggle { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .alert-toggle span { font-size: 13px; }

        /* Switch Styling */
        .switch { position: relative; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--surface3); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: var(--muted); transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--orange); }
        input:checked + .slider:before { transform: translateX(20px); background-color: white; }

        .map-area { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }

        .btn-action { width: 100%; padding: 12px; border-radius: 8px; border: none; font-family: 'Rajdhani'; font-weight: 700; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .btn-lock { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
        .btn-unlock { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
    </style>
</head>
<body>

    <div id="alertBanner">⚠️ VEÍCULO FORA DA CERCA PERMITIDA!</div>

    <nav class="topnav">
        <div class="brand">Kappo Tracking</div>
    </nav>

    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="section-title">Status do Veículo</div>
                <div id="deviceName" style="font-weight: 700; margin-bottom: 5px;">Carregando...</div>
                <div id="deviceStatus" style="font-size: 12px; color: var(--green);">● Online</div>
            </div>

            <div class="sidebar-section">
                <div class="section-title">Alertas Inteligentes</div>
                <div class="alert-toggle">
                    <span>Cerca Eletrônica</span>
                    <label class="switch"><input type="checkbox" id="geofenceAlert" checked><span class="slider"></span></label>
                </div>
                <div class="alert-toggle">
                    <span>Alerta de Ignição</span>
                    <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                </div>
                <div class="alert-toggle">
                    <span>Vibração/Choque</span>
                    <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-title">Controle Remoto</div>
                <button class="btn-action btn-lock" onclick="alert('Comando de bloqueio enviado!')">Bloquear Motor</button>
                <button class="btn-action btn-unlock" onclick="alert('Comando de liberação enviado!')">Liberar Motor</button>
            </div>
        </aside>

        <main class="map-area">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const TRACCAR_URL = 'https://api.kappotracking.com.br';
        let map, marker;
        let deviceId = null;

        // Som de Alerta (Beep de segurança)
        const alertSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        alertSound.loop = true;

        // Configurações do Mapa
        map = L.map('map', { zoomControl: false }).setView([-23.4332, -45.0711], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const iconKappo = L.divIcon({
            className: 'kappo-marker',
            html: `<div style="background: var(--orange); width: 15px; height: 15px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 15px var(--orange);"></div>`,
            iconSize: [15, 15]
        });

        async function fetchSystemData() {
            try {
                // Simulação de busca de dados (Substitua pela sua lógica de login)
                const user = JSON.parse(localStorage.getItem('kappo_user'));
                const auth = 'Basic ' + btoa(user.email + ':kappo123');

                const res = await fetch(`${TRACCAR_URL}/api/devices`, { headers: { 'Authorization': auth } });
                const devices = await res.json();

                if (devices.length > 0) {
                    deviceId = devices[0].id;
                    document.getElementById('deviceName').textContent = devices[0].name;
                    updatePosition(auth);
                    checkEvents(auth); // Função que verifica se saiu da cerca
                }
            } catch (e) { console.log("Erro de conexão"); }
        }

        async function updatePosition(auth) {
            const res = await fetch(`${TRACCAR_URL}/api/positions?deviceId=${deviceId}`, { headers: { 'Authorization': auth } });
            const data = await res.json();
            if (data.length > 0) {
                const pos = [data[0].latitude, data[0].longitude];
                if (!marker) {
                    marker = L.marker(pos, { icon: iconKappo }).addTo(map);
                } else {
                    marker.setLatLng(pos);
                }
                map.panTo(pos);
            }
        }

        // --- LÓGICA DE ALERTA DE CERCA ---
        async function checkEvents(auth) {
            const res = await fetch(`${TRACCAR_URL}/api/events?deviceId=${deviceId}`, { headers: { 'Authorization': auth } });
            const events = await res.json();

            // Verifica se o último evento é de saída de cerca (geofenceExit)
            const exitEvent = events.find(e => e.type === 'geofenceExit');
            const alertEnabled = document.getElementById('geofenceAlert').checked;

            if (exitEvent && alertEnabled) {
                triggerCriticalAlert();
            } else {
                stopCriticalAlert();
            }
        }

        function triggerCriticalAlert() {
            document.getElementById('alertBanner').style.display = 'block';
            alertSound.play().catch(e => console.log("Interação necessária para som"));
            // Faz o marcador pulsar
            if (marker) marker._icon.style.animation = "pulseAlert 0.5s infinite";
        }

        function stopCriticalAlert() {
            document.getElementById('alertBanner').style.display = 'none';
            alertSound.pause();
            alertSound.currentTime = 0;
            if (marker) marker._icon.style.animation = "none";
        }

        fetchSystemData();
        setInterval(fetchSystemData, 5000); // Atualiza a cada 5 segundos
    </script>
</body>
</html>
