<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Kappo Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --orange: #FF8C00;
            --orange-dim: rgba(255,140,0,0.12);
            --red: #FF3B3B;
            --green: #00E07A;
            --bg: #0C0C0E;
            --surface: #111114;
            --surface2: #18181D;
            --border: rgba(255,255,255,0.06);
            --text: #FFFFFF;
            --muted: #5A5A6E;
            --sidebar-w: 320px;
        }

        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Topnav */
        .topnav { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 1000; }
        .brand { font-family: 'Rajdhani', sans-serif; font-weight: 700; color: var(--orange); text-transform: uppercase; letter-spacing: 2px; font-size: 18px; }

        .layout { flex: 1; display: flex; position: relative; overflow: hidden; }

        /* Sidebar */
        .sidebar { 
            width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; overflow-y: auto; z-index: 900;
        }

        .section-title { padding: 15px 20px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid var(--border); background: var(--surface2); font-weight: 600; }
        
        /* --- NOVOS ESTILOS: STATUS E CONTROLES --- */
        .vehicle-info { padding: 20px; border-bottom: 1px solid var(--border); }
        .status-badge { display: inline-flex; align-items: center; gap: 6px; color: var(--green); font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 15px; }
        .status-dot-pulse { width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .info-card { background: var(--surface2); border: 1px solid var(--border); padding: 10px; border-radius: 8px; }
        .info-label { display: block; font-size: 9px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
        .info-value { display: block; font-family: 'Rajdhani'; font-weight: 600; font-size: 14px; }

        .control-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-control { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; font-family: 'Rajdhani'; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; font-size: 12px; }
        .btn-lock { background: rgba(255, 59, 59, 0.1); color: var(--red); border-color: rgba(255, 59, 59, 0.2); }
        .btn-unlock { background: rgba(0, 224, 122, 0.1); color: var(--green); border-color: rgba(0, 224, 122, 0.2); }
        .btn-lock:hover { background: var(--red); color: #fff; }
        .btn-unlock:hover { background: var(--green); color: #fff; }

        .alert-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .alert-item:last-child { border: none; }
        .alert-label { font-size: 12px; color: rgba(255,255,255,0.8); }

        /* Switch Toggle */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #2c2c2e; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--orange); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* Estilos originais do histórico mantidos */
        .history-filter { padding: 20px; border-bottom: 1px solid var(--border); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
        .input-group input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; color-scheme: dark; }
        .btn { flex: 1; padding: 12px; border-radius: 6px; font-weight: 700; font-family: 'Rajdhani'; font-size: 14px; text-transform: uppercase; cursor: pointer; border: none; }
        .btn-search { background: var(--orange); color: #000; }
        #historyItems { flex: 1; overflow-y: auto; }
        .history-item { padding: 15px 20px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .history-item-speed { font-size: 11px; color: var(--orange); font-family: 'Rajdhani'; font-weight: 700; }
        
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; background: var(--bg); }
        .neon-route-glow { filter: drop-shadow(0 0 6px rgba(255, 140, 0, 0.8)); }

        @media (max-width: 768px) {
            .layout { flex-direction: column; }
            .sidebar { width: 100%; height: 45vh; border-top: 1px solid var(--border); }
            .map-container { height: 55vh; }
        }
    </style>
</head>
<body>

    <nav class="topnav">
        <div class="brand">Kappo Tracking</div>
        <div style="flex:1"></div>
        <div id="connectionStatus" style="font-size: 10px; color: #00E07A; font-weight: 600;">
            <span class="status-dot-pulse" style="display:inline-block; margin-right:6px;"></span>
            SISTEMA ONLINE
        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            
            <div class="section-title">Status do Veículo</div>
            <div class="vehicle-info">
                <div class="status-badge">
                    <span class="status-dot-pulse"></span> Monitoramento Ativo
                </div>
                
                <div class="info-grid">
                    <div class="info-card">
                        <span class="info-label">Ignição</span>
                        <span class="info-value" style="color: var(--muted);">Desligada</span>
                    </div>
                    <div class="info-card">
                        <span class="info-label">Sinal GPS</span>
                        <span class="info-value" style="color: var(--green);">Forte</span>
                    </div>
                    <div class="info-card">
                        <span class="info-label">Velocidade</span>
                        <span class="info-value">0 km/h</span>
                    </div>
                    <div class="info-card">
                        <span class="info-label">Bateria</span>
                        <span class="info-value">12.8V</span>
                    </div>
                </div>

                <div class="control-group">
                    <button class="btn-control btn-lock" onclick="alert('Comando Bloquear enviado')">Bloquear</button>
                    <button class="btn-control btn-unlock" onclick="alert('Comando Liberar enviado')">Liberar</button>
                </div>

                <div class="section-title" style="background:transparent; padding: 10px 0; border:none;">Alertas Inteligentes</div>
                <div class="alert-list">
                    <div class="alert-item">
                        <span class="alert-label">Cerca Eletrônica</span>
                        <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                    </div>
                    <div class="alert-item">
                        <span class="alert-label">Alerta de Ignição</span>
                        <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                    </div>
                    <div class="alert-item">
                        <span class="alert-label">Movimento Indevido</span>
                        <label class="switch"><input type="checkbox"><span class="slider"></span></label>
                    </div>
                </div>
            </div>

            <div class="section-title">Filtro de Percurso</div>
            <div class="history-filter">
                <div class="input-group">
                    <label>Início do Trajeto</label>
                    <input type="datetime-local" id="dateFrom">
                </div>
                <div class="input-group">
                    <label>Fim do Trajeto</label>
                    <input type="datetime-local" id="dateTo">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-search" id="btnVisualizar" onclick="loadHistory()">Visualizar Rota</button>
                    <button class="btn" style="background: var(--surface2); color: var(--muted);" onclick="clearMap()">Limpar</button>
                </div>
            </div>

            <div class="section-title">Pontos de Registro</div>
            <div id="historyItems">
                <div id="emptyState" style="padding: 30px 20px; text-align: center; color: var(--muted); font-size: 13px;">
                    Selecione um período para ver o histórico.
                </div>
            </div>
        </aside>

        <main class="map-container">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const TRACCAR_URL = 'https://api.kappotracking.com.br';
        let map, marker, routeLine;
        let deviceId = null;

        const user = JSON.parse(localStorage.getItem('kappo_user'));
        const auth = 'Basic ' + btoa(user.email + ':kappo123');

        map = L.map('map', { zoomControl: false }).setView([-23.4332, -45.0711], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const kappoIcon = L.divIcon({
            className: 'custom-div-icon',
            html: `<div style="background-color: var(--orange); width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 15px var(--orange);"></div>`,
            iconSize: [14, 14], iconAnchor: [7, 7]
        });

        async function init() {
            try {
                const res = await fetch(`${TRACCAR_URL}/api/devices`, { headers: { 'Authorization': auth } });
                const devices = await res.json();
                if (devices.length > 0) {
                    deviceId = devices[0].id;
                    fetchLiveLocation();
                }
            } catch (e) { console.error(e); }
        }

        async function fetchLiveLocation() {
            try {
                const res = await fetch(`${TRACCAR_URL}/api/positions?deviceId=${deviceId}`, { headers: { 'Authorization': auth } });
                const data = await res.json();
                if (data.length > 0) {
                    const pos = data[0];
                    const latlng = [pos.latitude, pos.longitude];
                    if (!marker) {
                        marker = L.marker(latlng, { icon: kappoIcon }).addTo(map);
                        map.setView(latlng, 16);
                    } else {
                        marker.setLatLng(latlng);
                    }
                }
            } catch(e) {}
            setTimeout(fetchLiveLocation, 5000);
        }

        async function loadHistory() {
            const from = new Date(document.getElementById('dateFrom').value).toISOString();
            const to = new Date(document.getElementById('dateTo').value).toISOString();
            const btn = document.getElementById('btnVisualizar');
            btn.textContent = "Buscando...";

            try {
                const res = await fetch(`${TRACCAR_URL}/api/positions?deviceId=${deviceId}&from=${from}&to=${to}`, { headers: { 'Authorization': auth } });
                const positions = await res.json();
                if (positions.length === 0) { alert("Sem rotas"); return; }

                if (routeLine) map.removeLayer(routeLine);
                const pathCoords = positions.map(p => [p.latitude, p.longitude]);
                routeLine = L.polyline(pathCoords, { color: '#FF8C00', weight: 3, className: 'neon-route-glow' }).addTo(map);
                map.fitBounds(routeLine.getBounds());
                renderHistoryList(positions);
            } catch (e) { alert("Erro ao carregar"); }
            finally { btn.textContent = "Visualizar Rota"; }
        }

        function renderHistoryList(positions) {
            const container = document.getElementById('historyItems');
            container.innerHTML = '';
            positions.slice(-20).reverse().forEach(p => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<span>${new Date(p.deviceTime).toLocaleTimeString()}</span><span class="history-item-speed">${Math.round(p.speed * 1.852)} km/h</span>`;
                div.onclick = () => map.setView([p.latitude, p.longitude], 18);
                container.appendChild(div);
            });
        }

        function clearMap() {
            if (routeLine) map.removeLayer(routeLine);
            document.getElementById('historyItems').innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted)">Histórico limpo.</div>';
        }

        init();
    </script>
</body>
</html>
