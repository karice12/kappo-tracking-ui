<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Kappo Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --orange: #FF8C00;
            --orange-glow: rgba(255,140,0,0.3);
            --red: #FF3B3B;
            --bg: #0C0C0E;
            --surface: #111114;
            --surface2: #18181D;
            --border: rgba(255,255,255,0.06);
            --text: #FFFFFF;
            --muted: #5A5A6E;
            --sidebar-w: 300px;
        }

        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: background 0.3s; }
        
        /* ESTADO BLOQUEADO */
        body.is-locked { background: #2a0a0a; }
        body.is-locked::after { content: ""; position: fixed; inset: 0; background: rgba(255, 0, 0, 0.15); pointer-events: none; z-index: 9999; border: 4px solid var(--red); }

        .topnav { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; z-index: 300; }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-icon { width: 32px; height: 32px; background: var(--orange); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
        .brand-name { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 1px; }

        .menu-toggle { background: var(--surface2); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 8px; cursor: pointer; margin-right: 15px; }

        .layout { flex: 1; display: flex; overflow: hidden; }

        .sidebar { 
            width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; transition: transform 0.3s ease; overflow-y: auto; z-index: 250;
        }
        .sidebar.collapsed { transform: translateX(-100%); width: 0; }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 10px; }

        /* CARD DO VEÍCULO */
        .vehicle-card { padding: 15px; border-bottom: 1px solid var(--border); }
        .vehicle-img-container { width: 100%; height: 140px; background: #000; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .vehicle-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .status-badge { position: absolute; top: 10px; right: 10px; background: #00E07A; color: black; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }

        .sb-section { padding: 20px; border-bottom: 1px solid var(--border); }
        .sb-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

        /* ALERTAS */
        .alert-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .switch { position: relative; width: 36px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #2a2a30; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background: var(--orange); }
        input:checked + .slider:before { transform: translateX(18px); }

        /* HISTÓRICO */
        .hist-item { padding: 12px; background: var(--surface2); border-radius: 8px; margin-bottom: 8px; border-left: 3px solid var(--orange); }
        .hist-time { font-size: 11px; color: var(--orange); font-weight: 600; }
        .hist-addr { font-size: 12px; color: #ccc; margin-top: 4px; }

        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }

        /* WIDGETS */
        .speed-widget { position: absolute; top: 20px; right: 20px; z-index: 100; background: rgba(17,17,20,0.9); border: 1px solid var(--border); padding: 12px; border-radius: 12px; text-align: center; }
        .speed-val { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; color: var(--orange); }

        .btn-cmd { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); font-family: 'Rajdhani', sans-serif; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 8px; transition: 0.2s; }
        .btn-lock { background: rgba(255, 59, 59, 0.1); color: var(--red); border-color: var(--red); }
        .btn-unlock { background: rgba(0, 224, 122, 0.1); color: #00E07A; border-color: #00E07A; }

        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 59, 59, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0); } }
        .marker-alert { width: 16px; height: 16px; background: var(--red); border: 2px solid #fff; border-radius: 50%; animation: pulse-red 1s infinite; }
    </style>
</head>
<body id="mainBody">

    <nav class="topnav">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <div class="brand">
            <div class="brand-icon">⚡</div>
            <span class="brand-name">KAPPO TRACKING</span>
        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="vehicle-card">
                <div class="vehicle-img-container">
                    <span class="status-badge">ONLINE</span>
                    <img src="https://images.unsplash.com/photo-1558981403-c5f91cbba527?q=80&w=500" alt="Veículo">
                </div>
                <div style="margin-top: 10px;">
                    <h3 id="deviceName" style="font-size: 16px;">Meu Veículo</h3>
                    <p id="deviceImei" style="font-size: 11px; color: var(--muted);">IMEI: ---</p>
                </div>
            </div>

            <div class="sb-section">
                <div class="sb-title">Alertas Inteligentes</div>
                <div class="alert-item"><span>Cerca Geofence</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                <div class="alert-item"><span>Alerta Ignição</span><label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
                <div class="alert-item"><span>Vibração/Choque</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
            </div>

            <div class="sb-section">
                <div class="sb-title">Histórico de Hoje</div>
                <div id="historyList">
                    <div class="hist-item">
                        <div class="hist-time">12:10 - Estacionado</div>
                        <div class="hist-addr">Av. Iperoig, Centro, Ubatuba</div>
                    </div>
                    <div class="hist-item">
                        <div class="hist-time">11:45 - Em Trânsito</div>
                        <div class="hist-addr">Rua Guarani, Itaguá</div>
                    </div>
                </div>
            </div>

            <div class="sb-section">
                <button class="btn-cmd btn-lock" onclick="toggleLock(true)">Bloquear Motor</button>
                <button class="btn-cmd btn-unlock" onclick="toggleLock(false)">Liberar Motor</button>
            </div>
        </aside>

        <main class="map-container">
            <div class="speed-widget">
                <div style="font-size: 9px; color: var(--muted);">VELOCIDADE</div>
                <div class="speed-val" id="mapSpeed">0</div>
                <div style="font-size: 10px;">KM/H</div>
            </div>
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([-23.4332, -45.0711], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        let marker = L.marker([-23.4332, -45.0711], {
            icon: L.divIcon({ className: '', html: '<div style="width:16px; height:16px; background:#FF8C00; border:2px solid white; border-radius:50%;"></div>' })
        }).addTo(map);

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('collapsed');
            setTimeout(() => map.invalidateSize(), 300);
        }

        // FUNÇÃO DE BLOQUEIO (TELA VERMELHA)
        function toggleLock(locked) {
            const body = document.getElementById('mainBody');
            if(locked) {
                if(confirm("Deseja BLOQUEAR o veículo agora?")) {
                    body.classList.add('is-locked');
                    // Aqui você chamaria sua API do Traccar: engineStop
                }
            } else {
                body.classList.remove('is-locked');
                // Aqui você chamaria sua API do Traccar: engineResume
            }
        }
    </script>
</body>
</html>
