<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Kappo Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Reset e Variáveis de Cor Neon/Glass */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --amber: #FF8C00;
            --amber-glow: rgba(255, 140, 0, 0.4);
            --red: #FF3B3B;
            --green: #00E07A;
            --bg-dark: #050505;
            /* Efeito Vidro Premium */
            --glass: rgba(15, 15, 15, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --sidebar-w: 280px;
        }

        body { 
            font-family: 'DM Sans', sans-serif; 
            background: var(--bg-dark); 
            color: #fff; 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
        }

        /* SIDEBAR GLASSMORPHISM REAL */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .sidebar-header {
            padding: 30px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-square {
            width: 40px; height: 40px;
            background: var(--amber);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--amber-glow);
        }

        .brand-title {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 22px;
            letter-spacing: 2px;
            color: #fff;
        }

        /* Seções e Itens do Menu */
        .section-label {
            padding: 20px 25px 10px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.3);
            font-weight: 700;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 14px 25px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: 0.3s;
            border-right: 3px solid transparent;
        }

        .nav-link:hover, .nav-link.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
            border-right-color: var(--amber);
        }

        .nav-link svg {
            width: 20px; height: 20px;
            margin-right: 15px;
            stroke: var(--amber);
            fill: none;
            stroke-width: 2;
        }

        /* PAINEL DE ALERTAS INTELIGENTES */
        .alerts-group { padding: 10px 25px; }

        .alert-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            font-size: 14px;
            color: rgba(255,255,255,0.8);
        }

        /* Toggles Laranja Âmbar */
        .switch { position: relative; width: 38px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; inset: 0;
            background: rgba(255,255,255,0.1);
            transition: 0.4s; border-radius: 20px;
            border: 1px solid var(--glass-border);
        }
        .slider:before {
            position: absolute; content: "";
            height: 14px; width: 14px; left: 2px; bottom: 2px;
            background: #fff; transition: 0.4s; border-radius: 50%;
        }
        input:checked + .slider { background: var(--amber); box-shadow: 0 0 10px var(--amber-glow); border-color: transparent; }
        input:checked + .slider:before { transform: translateX(18px); }

        /* COMANDOS REMOTOS */
        .commands-area {
            padding: 20px 25px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: auto;
            padding-bottom: 30px;
        }

        .cmd-btn {
            padding: 12px;
            border-radius: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            border: 1px solid transparent;
        }

        .btn-lock { background: rgba(255, 59, 59, 0.1); color: var(--red); border-color: var(--red); }
        .btn-unlock { background: rgba(0, 224, 122, 0.1); color: var(--green); border-color: var(--green); }
        .cmd-btn:hover { transform: translateY(-2px); filter: brightness(1.3); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* MAPA E WIDGETS */
        .map-container { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }

        .speed-overlay {
            position: absolute; top: 25px; right: 25px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 15px;
            z-index: 50;
            text-align: center;
        }

        .speed-num {
            font-family: 'Rajdhani', sans-serif;
            font-size: 42px;
            font-weight: 700;
            color: var(--amber);
            line-height: 1;
        }

        .speed-unit { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }

        /* Estilo Customizado do Popup do Mapa */
        .leaflet-popup-content-wrapper { background: var(--glass); backdrop-filter: blur(10px); color: #fff; border: 1px solid var(--glass-border); }
        .leaflet-popup-tip { background: var(--glass); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-square">
                <svg viewBox="0 0 24 24" fill="black" width="24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <span class="brand-title">KAPPO</span>
        </div>

        <div class="section-label">Monitoramento</div>
        <a href="#" class="nav-link active">
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <span>Mapa em Tempo Real</span>
        </a>

        <div class="section-label">Alertas Inteligentes</div>
        <div class="alerts-group">
            <div class="alert-item">
                <span>Cerca Eletrônica</span>
                <label class="switch"><input type="checkbox" id="geo-check" onchange="apiControl('Cerca', this)"><span class="slider"></span></label>
            </div>
            <div class="alert-item">
                <span>Ignição (ACC)</span>
                <label class="switch"><input type="checkbox" id="acc-check" checked onchange="apiControl('Ignição', this)"><span class="slider"></span></label>
            </div>
            <div class="alert-item">
                <span>Vibração</span>
                <label class="switch"><input type="checkbox" id="vib-check" onchange="apiControl('Vibração', this)"><span class="slider"></span></label>
            </div>
        </div>

        <div class="section-label">Segurança</div>
        <div class="commands-area">
            <button class="cmd-btn btn-lock" onclick="engineControl('STOP')">Bloquear</button>
            <button class="cmd-btn btn-unlock" onclick="engineControl('RESUME')">Liberar</button>
        </div>
    </aside>

    <main class="map-container">
        <div class="speed-overlay">
            <div class="speed-num" id="speed-val">0</div>
            <div class="speed-unit">km/h</div>
        </div>
        <div id="map"></div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicialização do Mapa com Tema Dark
        const map = L.map('map', { zoomControl: false }).setView([-23.4332, -45.0711], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Ícone Neon para o Veículo
        const customIcon = L.divIcon({
            className: '',
            html: `<div style="width:22px; height:22px; background:var(--amber); border:3px solid #fff; border-radius:50%; box-shadow: 0 0 20px var(--amber);"></div>`,
            iconAnchor: [11, 11]
        });
        const marker = L.marker([-23.4332, -45.0711], { icon: customIcon }).addTo(map)
                        .bindPopup("<b>ST-901 4G</b><br>Status: Conectado").openPopup();

        // LOGICA FUNCIONAL DOS BOTÕES
        function apiControl(alerta, checkbox) {
            const status = checkbox.checked ? "ATIVADO" : "DESATIVADO";
            // Aqui entra a chamada para o Traccar no futuro
            console.log(`Kappo System: ${alerta} ${status}`);
        }

        function engineControl(cmd) {
            if (cmd === 'STOP') {
                if(confirm("BLOQUEAR MOTOR? O veículo irá parar imediatamente.")) {
                    document.getElementById('speed-val').innerText = "0";
                    alert("Comando de Bloqueio enviado!");
                }
            } else {
                alert("Motor Liberado com sucesso!");
            }
        }
    </script>
</body>
</html>
