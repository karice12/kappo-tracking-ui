<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Kappo Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --orange: #FF8C00;
            --orange-dim: rgba(255,140,0,0.12);
            --orange-glow: rgba(255,140,0,0.25);
            --red: #FF3B3B;
            --red-dim: rgba(255,59,59,0.12);
            --green: #00E07A;
            --green-dim: rgba(0,224,122,0.12);
            --cyan-glow: #00E5FF;
            --bg: #0C0C0E;
            --surface: #111114;
            --surface2: #18181D;
            --surface3: #1F1F26;
            --border: rgba(255,255,255,0.06);
            --border2: rgba(255,255,255,0.1);
            --text: #FFFFFF;
            --muted: #5A5A6E;
            --muted2: #8A8A9A;
            --sidebar-w: 280px;
        }

        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

        .topnav {
            height: 56px; min-height: 56px;
            background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 200;
        }
        
        .menu-btn { 
            display: flex; align-items: center; justify-content: center; 
            width: 36px; height: 36px; background: var(--surface2); 
            border: 1px solid var(--border); border-radius: 10px; 
            cursor: pointer; flex-shrink: 0; transition: all 0.2s; 
        }
        .menu-btn:hover { border-color: var(--border2); background: #202026; }
        .burger-icon { width: 16px; height: 12px; display: flex; flex-direction: column; justify-content: space-between; }
        .burger-line { 
            height: 2px; width: 100%; background: #fff; border-radius: 2px; 
            box-shadow: -1px 0 3px var(--cyan-glow), 1px 0 3px var(--orange); 
            transition: all 0.3s ease;
        }
        
        .topnav-brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .brand-icon {
            width: 34px; height: 34px; background: var(--orange); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--orange-glow);
        }
        .brand-icon svg { width: 18px; height: 18px; fill: #000; }
        .brand-name { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
        .brand-sub { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; display: none; }
        @media(min-width:600px){ .brand-sub { display: block; } }

        .topnav-spacer { flex: 1; }

        .nav-status { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: blink 2s ease-in-out infinite; }
        .status-dot.locked { background: var(--red); animation: none; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .status-label { font-size: 11px; color: var(--muted2); white-space: nowrap; }
        .status-label.locked { color: var(--red); font-weight: bold; }

        .layout { flex: 1; display: flex; overflow: hidden; position: relative; }

        .sidebar {
            width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 150; 
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), margin-left 0.35s cubic-bezier(0.4,0,0.2,1);
            position: absolute; top: 0; bottom: 0; left: 0; overflow-y: auto; 
        }
        .sidebar.closed { transform: translateX(calc(-1 * var(--sidebar-w))); }

        @media(min-width:900px){ 
            .sidebar { position: relative; transform: none !important; margin-left: 0; } 
            .sidebar.closed { margin-left: calc(-1 * var(--sidebar-w)); transform: none !important; }
        }

        .sidebar-overlay {
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 140;
            backdrop-filter: blur(2px);
        }
        .sidebar-overlay.visible { display: block; }

        .bike-card { padding: 12px; border-bottom: 1px solid var(--border); }
        .bike-photo {
            width: 100%; height: 80px; border-radius: 8px; overflow: hidden; margin-bottom: 8px;
            background: var(--surface3);
            background-image: url('https://images.unsplash.com/photo-1558981806-ec527fa84c39?q=80&w=600');
            background-size: cover; background-position: center;
            position: relative;
        }
        .bike-name { font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; }
        
        .pill {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px; border-radius: 20px; font-size: 9px; font-weight: 600;
            text-transform: uppercase; margin: 8px 0;
        }
        .pill-green { background: var(--green-dim); color: var(--green); }
        .pill-red { background: var(--red-dim); color: var(--red); }

        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .detail-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px; }
        .detail-box-label { font-size: 8px; color: var(--muted); text-transform: uppercase; }
        .detail-box-value { font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 600; color: #ddd; }

        .controls { padding: 12px; border-bottom: 1px solid var(--border); }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .ctrl-btn {
            padding: 10px; border: 1px solid var(--border); border-radius: 8px;
            font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700;
            text-transform: uppercase; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-lock { background: var(--red-dim); color: var(--red); }
        .btn-unlock { background: var(--green-dim); color: var(--green); }

        /* ALERTAS INTELIGENTES - DESIGN */
        .alerts-panel { padding: 12px; border-bottom: 1px solid var(--border); }
        .alerts-title { display: flex; align-items: center; gap: 6px; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .alerts-title svg { width: 12px; height: 12px; stroke: var(--orange); fill: none; stroke-width: 2; }
        .alert-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .alert-label { font-size: 11px; color: var(--text); }
        
        .toggle-switch { position: relative; width: 34px; height: 18px; display: inline-block; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--surface3); transition: .3s; border-radius: 18px; border: 1px solid var(--border); }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px; background-color: var(--muted); transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--orange-dim); border-color: var(--orange); }
        input:checked + .slider:before { transform: translateX(16px); background-color: var(--orange); box-shadow: 0 0 8px var(--orange-glow); }

        .map-area { flex: 1; position: relative; overflow: hidden; }
        #map { position: absolute; inset: 0; z-index: 1; }

        @keyframes alertMapPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.8); transform: scale(1); }
            70% { box-shadow: 0 0 0 25px rgba(255, 59, 59, 0); transform: scale(1.2); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0); transform: scale(1); }
        }

        .speed-widget {
            position: absolute; top: 12px; right: 12px; z-index: 10;
            background: rgba(17,17,20,0.92); border: 1px solid var(--border2);
            border-radius: 14px; padding: 12px 16px; min-width: 120px;
            backdrop-filter: blur(16px); text-align: center;
        }
        .speed-value { font-family: 'Rajdhani', sans-serif; font-size: 30px; font-weight: 700; color: var(--orange); }

        .mobile-bottombar {
            display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
            background: rgba(17,17,20,0.95); border-top: 1px solid var(--border);
            padding: 8px 12px; gap: 8px; backdrop-filter: blur(16px);
        }
        @media(max-width:899px){ .mobile-bottombar { display: flex; } }
    </style>
</head>
<body id="mainBody">

    <nav class="topnav">
        <button class="menu-btn" onclick="toggleSidebar()">
            <div class="burger-icon">
                <div class="burger-line"></div>
                <div class="burger-line"></div>
                <div class="burger-line"></div>
            </div>
        </button>
        <div class="topnav-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <div class="brand-name">Kappo</div>
        </div>
        <div class="topnav-spacer"></div>
        <div class="nav-status" id="navStatus">
            <div class="status-dot" id="navDot"></div>
            <span class="status-label" id="navLabel">Conectando...</span>
        </div>
    </nav>

    <div class="layout">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <aside class="sidebar closed" id="sidebar">
            <div class="bike-card">
                <div class="bike-photo"></div>
                <div class="bike-name" id="vehicleName">Buscando...</div>
                <div class="pill pill-green" id="statusPill">Monitoramento Ativo</div>
                <div class="detail-grid">
                    <div class="detail-box"><div class="detail-box-label">ID</div><div class="detail-box-value" id="idDevice">#</div></div>
                    <div class="detail-box"><div class="detail-box-label">Bat</div><div class="detail-box-value" id="sideBatery">-%</div></div>
                </div>
            </div>

            <div class="controls">
                <div class="btn-row">
                    <button class="ctrl-btn btn-lock" onclick="sendCommandToBike('engineStop')">Bloquear</button>
                    <button class="ctrl-btn btn-unlock" onclick="sendCommandToBike('engineResume')">Liberar</button>
                </div>
            </div>

            <div class="alerts-panel">
                <div class="alerts-title">
                    <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    Alertas de Segurança
                </div>
                <div class="alert-row">
                    <span class="alert-label">Cerca Eletrônica</span>
                    <label class="toggle-switch"><input type="checkbox" id="t-geofence" onchange="updateAlert('geofence', this.checked)"><span class="slider"></span></label>
                </div>
                <div class="alert-row">
                    <span class="alert-label">Ignição (ACC)</span>
                    <label class="toggle-switch"><input type="checkbox" id="t-acc" checked onchange="updateAlert('acc', this.checked)"><span class="slider"></span></label>
                </div>
                <div class="alert-row">
                    <span class="alert-label">Vibração/Choque</span>
                    <label class="toggle-switch"><input type="checkbox" id="t-vib" onchange="updateAlert('vibration', this.checked)"><span class="slider"></span></label>
                </div>
                <div class="alert-row">
                    <span class="alert-label">Desconexão (Cut)</span>
                    <label class="toggle-switch"><input type="checkbox" id="t-cut" checked onchange="updateAlert('powerCut', this.checked)"><span class="slider"></span></label>
                </div>
            </div>

            <div id="historyList" style="padding:12px; font-size:11px; color:var(--muted2)"></div>
        </aside>

        <div class="map-area">
            <div id="map"></div>
            <div class="speed-widget">
                <div class="speed-value" id="speedVal">0</div>
                <div style="font-size:10px; color:var(--muted2)">km/h</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const TRACCAR_URL = 'https://api.kappotracking.com.br';
        const socketUrl = 'wss://api.kappotracking.com.br/api/socket';
        let deviceId = null;
        let marker = null;

        const loggedUser = JSON.parse(localStorage.getItem('kappo_user'));
        if (!loggedUser) window.location.href = 'index.html';

        function getAuthHeaders() {
            return { 'Authorization': 'Basic ' + btoa(loggedUser.email + ':kappo123'), 'Content-Type': 'application/json' };
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('sidebarOverlay');
            sb.classList.toggle('closed');
            if (window.innerWidth < 900) ov.classList.toggle('visible');
            setTimeout(() => map.invalidateSize(), 400);
        }

        var map = L.map('map').setView([-23.4332, -45.0711], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        function makeIcon(color, pulse = false) {
            const style = pulse ? 'animation: alertMapPulse 1s infinite;' : '';
            return L.divIcon({
                className: '',
                html: `<div style="width:16px; height:16px; border-radius:50%; background:${color}; border:2px solid #fff; box-shadow: 0 0 10px ${color}; ${style}"></div>`,
                iconSize: [16, 16], iconAnchor: [8, 8]
            });
        }

        // WEBSOCKET PARA ALERTAS EM TEMPO REAL
        function startWebSocket() {
            const socket = new WebSocket(socketUrl);
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.events) {
                    data.events.forEach(e => {
                        triggerVisualAlert(e.type);
                    });
                }
                if (data.positions) {
                    updateMapPosition(data.positions[0]);
                }
            };
        }

        function triggerVisualAlert(type) {
            const label = document.getElementById('navLabel');
            const dot = document.getElementById('navDot');
            
            marker.setIcon(makeIcon('#FF3B3B', true));
            dot.className = 'status-dot locked';
            label.textContent = `⚠️ ALERTA: ${type.toUpperCase()}`;
            label.style.color = 'var(--red)';

            setTimeout(() => {
                marker.setIcon(makeIcon('#FF8C00', false));
                dot.className = 'status-dot';
                label.textContent = 'Monitoramento ativo';
                label.style.color = 'var(--muted2)';
            }, 8000);
        }

        function updateMapPosition(pos) {
            const latlng = [pos.latitude, pos.longitude];
            if (!marker) {
                marker = L.marker(latlng, { icon: makeIcon('#FF8C00') }).addTo(map);
            } else {
                marker.setLatLng(latlng);
            }
            map.panTo(latlng);
            document.getElementById('speedVal').textContent = Math.round(pos.speed * 1.852);
        }

        async function init() {
            const res = await fetch(`${TRACCAR_URL}/api/devices`, { headers: getAuthHeaders() });
            const devices = await res.json();
            if (devices.length > 0) {
                deviceId = devices[0].id;
                document.getElementById('vehicleName').textContent = devices[0].name;
                document.getElementById('idDevice').textContent = deviceId;
                startWebSocket();
                document.getElementById('navLabel').textContent = 'Monitoramento ativo';
            }
        }

        function updateAlert(type, status) {
            console.log(`Alerta ${type}: ${status ? 'ON' : 'OFF'}`);
            // Aqui você pode adicionar a chamada de API para salvar preferência se desejar
        }

        async function sendCommandToBike(type) {
            const res = await fetch(`${TRACCAR_URL}/api/commands/send`, {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify({ deviceId, type })
            });
            if (res.ok) alert("Comando enviado com sucesso!");
        }

        init();
    </script>
</body>
</html>
