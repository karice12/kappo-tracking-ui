<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Kappo Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --orange: #FF8C00;
            --orange-dim: rgba(255,140,0,0.12);
            --orange-glow: rgba(255,140,0,0.25);
            --red: #FF3B3B;
            --red-dim: rgba(255,59,59,0.12);
            --green: #00E07A;
            --green-dim: rgba(0,224,122,0.12);
            --cyan-glow: #00E5FF;
            --bg: #0C0C0E;
            --surface: #111114;
            --surface2: #18181D;
            --surface3: #1F1F26;
            --border: rgba(255,255,255,0.06);
            --border2: rgba(255,255,255,0.1);
            --text: #FFFFFF;
            --muted: #5A5A6E;
            --muted2: #8A8A9A;
            --sidebar-w: 280px;
        }

        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

        .topnav {
            height: 56px; min-height: 56px;
            background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 200;
        }
        
        .menu-btn { 
            display: flex; align-items: center; justify-content: center; 
            width: 36px; height: 36px; background: var(--surface2); 
            border: 1px solid var(--border); border-radius: 10px; 
            cursor: pointer; flex-shrink: 0; transition: all 0.2s; 
        }
        .burger-icon { width: 16px; height: 12px; display: flex; flex-direction: column; justify-content: space-between; }
        .burger-line { 
            height: 2px; width: 100%; background: #fff; border-radius: 2px; 
            box-shadow: -1px 0 3px var(--cyan-glow), 1px 0 3px var(--orange); 
        }
        
        .topnav-brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .brand-icon {
            width: 34px; height: 34px; background: var(--orange); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--orange-glow);
        }
        .brand-icon svg { width: 18px; height: 18px; fill: #000; }
        .brand-name { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }

        .topnav-spacer { flex: 1; }

        .nav-status { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
        .status-dot.alert { background: var(--red); animation: pulse-alert 0.8s infinite; }
        @keyframes pulse-alert { 0% { box-shadow: 0 0 0 0 rgba(255,59,59,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,59,59,0); } 100% { box-shadow: 0 0 0 0 rgba(255,59,59,0); } }
        .status-label { font-size: 11px; color: var(--muted2); }

        .layout { flex: 1; display: flex; overflow: hidden; position: relative; }

        .sidebar {
            width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 150; 
            transition: margin-left 0.35s ease;
            position: relative; overflow-y: auto;
        }
        .sidebar.closed { margin-left: calc(-1 * var(--sidebar-w)); }

        .bike-card { padding: 12px; border-bottom: 1px solid var(--border); }
        .bike-photo {
            width: 100%; height: 80px; border-radius: 8px; overflow: hidden; margin-bottom: 8px;
            background: var(--surface3);
            background-image: url('https://images.unsplash.com/photo-1558981806-ec527fa84c39?q=80&w=600');
            background-size: cover; background-position: center;
        }

        .bike-name { font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; }
        .pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 9px; font-weight: 600; text-transform: uppercase; margin: 8px 0; }
        .pill-green { background: var(--green-dim); color: var(--green); }
        .pill-red { background: var(--red-dim); color: var(--red); }

        /* ALERTAS INTELIGENTES UI */
        .alerts-panel { padding: 12px; border-bottom: 1px solid var(--border); }
        .alerts-title { display: flex; align-items: center; gap: 6px; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .alerts-title svg { width: 12px; height: 12px; stroke: var(--orange); fill: none; stroke-width: 2; }
        
        .alert-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
        .alert-label { font-size: 11px; color: var(--text); }
        
        .switch { position: relative; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: var(--surface3); transition: .3s; border-radius: 18px; border: 1px solid var(--border); }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px; background-color: var(--muted); transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--orange-dim); border-color: var(--orange); }
        input:checked + .slider:before { transform: translateX(16px); background-color: var(--orange); box-shadow: 0 0 8px var(--orange); }

        .controls { padding: 12px; }
        .ctrl-btn {
            width: 100%; padding: 10px; border-radius: 8px; margin-bottom: 8px;
            font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700;
            text-transform: uppercase; cursor: pointer; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-lock { background: var(--red-dim); color: var(--red); }
        .btn-unlock { background: var(--green-dim); color: var(--green); }

        .map-area { flex: 1; position: relative; }
        #map { position: absolute; inset: 0; z-index: 1; }

        /* Estilo do Marcador Pulsante de Alerta */
        .alert-marker {
            width: 18px; height: 18px; background: var(--red);
            border: 3px solid #fff; border-radius: 50%;
            box-shadow: 0 0 20px var(--red);
            animation: map-pulse 1s infinite;
        }
        @keyframes map-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <nav class="topnav">
        <button class="menu-btn" onclick="toggleSidebar()">
            <div class="burger-icon"><div class="burger-line"></div><div class="burger-line"></div><div class="burger-line"></div></div>
        </button>
        <div class="topnav-brand">
            <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
            <div class="brand-name">Kappo Tracking</div>
        </div>
        <div class="topnav-spacer"></div>
        <div class="nav-status">
            <div class="status-dot" id="navDot"></div>
            <span class="status-label" id="navLabel">Sincronizando...</span>
        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="bike-card">
                <div class="bike-photo"></div>
                <div class="bike-name" id="vehicleName">Carregando...</div>
                <div class="pill pill-green" id="statusPill">Monitoramento Ativo</div>
            </div>

            <div class="alerts-panel">
                <div class="alerts-title">
                    <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    Alertas Inteligentes
                </div>
                <div class="alert-row">
                    <span class="alert-label">Cerca Eletrônica</span>
                    <label class="switch">
                        <input type="checkbox" id="check-geofence" onchange="toggleAlert('geofence', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="alert-row">
                    <span class="alert-label">Alerta de Ignição (ACC)</span>
                    <label class="switch">
                        <input type="checkbox" id="check-acc" onchange="toggleAlert('ignition', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="controls">
                <button class="ctrl-btn btn-lock" onclick="sendTraccarCommand('engineStop')">🔒 Bloquear Motor</button>
                <button class="ctrl-btn btn-unlock" onclick="sendTraccarCommand('engineResume')">🔓 Liberar Motor</button>
            </div>
        </aside>

        <div class="map-area">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const TRACCAR_URL = 'https://api.kappotracking.com.br';
        let deviceId = null;
        const loggedUser = JSON.parse(localStorage.getItem('kappo_user'));

        function getHeaders() {
            return {
                'Authorization': `Basic ${btoa(loggedUser.email + ':kappo123')}`,
                'Content-Type': 'application/json'
            };
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
            setTimeout(() => map.invalidateSize(), 400);
        }

        var map = L.map('map', { zoomControl: false }).setView([-23.4332, -45.0711], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Ícone customizado Kappo
        const iconNormal = L.divIcon({ className: '', html: '<div style="width:16px; height:16px; background:var(--orange); border:2px solid #fff; border-radius:50%; box-shadow: 0 0 10px var(--orange);"></div>', iconSize:[16,16] });
        const iconAlert = L.divIcon({ className: 'alert-marker', html: '', iconSize:[18,18] });

        var marker = L.marker([-23.4332, -45.0711], { icon: iconNormal }).addTo(map);

        async function updateDashboard() {
            try {
                const res = await fetch(`${TRACCAR_URL}/api/devices`, { headers: getHeaders() });
                const devices = await res.json();
                if (devices.length === 0) return;

                const dev = devices[0];
                deviceId = dev.id;
                document.getElementById('vehicleName').textContent = dev.name;

                const posRes = await fetch(`${TRACCAR_URL}/api/positions?deviceId=${deviceId}`, { headers: getHeaders() });
                const positions = await posRes.json();

                if (positions.length > 0) {
                    const pos = positions[positions.length - 1];
                    marker.setLatLng([pos.latitude, pos.longitude]);

                    // LOGICA DE ALERTA: Se o Traccar enviar qualquer alarme (cerca, vibração, etc)
                    if (pos.attributes.alarm) {
                        marker.setIcon(iconAlert);
                        document.getElementById('navDot').className = 'status-dot alert';
                        document.getElementById('navLabel').textContent = 'ALERTA: ' + pos.attributes.alarm;
                        document.getElementById('statusPill').className = 'pill pill-red';
                        document.getElementById('statusPill').textContent = '⚠️ Violação Detectada';
                    } else {
                        marker.setIcon(iconNormal);
                        document.getElementById('navDot').className = 'status-dot';
                        document.getElementById('navLabel').textContent = 'Monitoramento Online';
                        document.getElementById('statusPill').className = 'pill pill-green';
                        document.getElementById('statusPill').textContent = 'Monitoramento Ativo';
                    }
                }
            } catch (e) { console.error("Erro na atualização"); }
        }

        // Função para ativar/desativar cerca via comando
        async function toggleAlert(type, active) {
            if (!deviceId) return;
            console.log(`Comando Kappo: ${type} -> ${active}`);
            
            // Enviamos um comando 'custom' que o Traccar converte para o ST-901
            // Geralmente ST-901 ativa cerca via GPRS com o comando "GEOFENCE,ON" ou "ARM"
            try {
                await fetch(`${TRACCAR_URL}/api/commands/send`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({
                        deviceId: deviceId,
                        type: "custom",
                        attributes: { data: active ? "ARM" : "DISARM" } 
                    })
                });
                alert(active ? "Segurança Ativada" : "Segurança Desativada");
            } catch (e) { alert("Erro ao comunicar com o rastreador"); }
        }

        async function sendTraccarCommand(type) {
            if (!deviceId) return;
            try {
                const res = await fetch(`${TRACCAR_URL}/api/commands/send`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ deviceId: deviceId, type: type })
                });
                if (res.ok) alert("Comando enviado com sucesso!");
            } catch (e) { alert("Falha ao enviar comando"); }
        }

        setInterval(updateDashboard, 4000);
        updateDashboard();
    </script>
</body>
</html>
