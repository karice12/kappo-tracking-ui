<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Kappo Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --orange: #FF8C00;
            --orange-dim: rgba(255,140,0,0.12);
            --orange-glow: rgba(255,140,0,0.25);
            --red: #FF3B3B;
            --red-dim: rgba(255,59,59,0.12);
            --green: #00E07A;
            --green-dim: rgba(0,224,122,0.12);
            --bg: #0C0C0E;
            --surface: #111114;
            --surface2: #18181D;
            --surface3: #1F1F26;
            --border: rgba(255,255,255,0.06);
            --border2: rgba(255,255,255,0.1);
            --text: #FFFFFF;
            --muted: #5A5A6E;
            --muted2: #8A8A9A;
            --sidebar-w: 280px;
        }

        html, body { height: 100%; overflow: hidden; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

        .topnav {
            height: 56px; min-height: 56px;
            background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 200;
        }
        .topnav-brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .brand-icon {
            width: 34px; height: 34px; background: var(--orange); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--orange-glow);
        }
        .brand-icon svg { width: 18px; height: 18px; fill: #000; }
        .brand-name { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
        .brand-sub { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; display: none; }
        @media(min-width:600px){ .brand-sub { display: block; } }

        .topnav-spacer { flex: 1; }

        .nav-status { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: blink 2s ease-in-out infinite; }
        .status-dot.alert-active { background: var(--red); animation: pulse-red 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 59, 59, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0); } }
        .status-label { font-size: 11px; color: var(--muted2); white-space: nowrap; }

        .nav-btn {
            width: 34px; height: 34px; background: var(--surface2); border: 1px solid var(--border);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--muted2); transition: all 0.2s; flex-shrink: 0;
        }
        .nav-btn:hover { border-color: var(--border2); color: var(--text); }
        .nav-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

        .menu-btn { display: flex; }
        @media(min-width:900px){ .menu-btn { display: none; } }

        .layout { flex: 1; display: flex; overflow: hidden; position: relative; }

        .sidebar {
            width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; z-index: 150; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
            position: absolute; top: 0; bottom: 0; left: 0; overflow-y: auto;
        }
        @media(min-width:900px){ .sidebar { position: relative; transform: none !important; } }
        .sidebar.closed { transform: translateX(calc(-1 * var(--sidebar-w))); }

        .sidebar-overlay {
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 140;
            backdrop-filter: blur(2px);
        }
        .sidebar-overlay.visible { display: block; }

        .bike-card { padding: 12px; border-bottom: 1px solid var(--border); }
        .bike-photo {
            width: 100%; height: 80px; border-radius: 8px; overflow: hidden; margin-bottom: 8px;
            background: var(--surface3);
            background-image: url('https://images.unsplash.com/photo-1558981806-ec527fa84c39?q=80&w=600');
            background-size: cover; background-position: center;
            position: relative;
        }
        .bike-badge {
            position: absolute; bottom: 6px; left: 6px; z-index: 1;
            background: rgba(0,0,0,0.7); border: 1px solid var(--border2);
            padding: 2px 6px; border-radius: 4px;
            font-size: 8px; color: #fff; letter-spacing: 1px; text-transform: uppercase;
            backdrop-filter: blur(8px);
        }

        .bike-name { font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 2px; }
        .pill {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px; border-radius: 20px; font-size: 9px; font-weight: 600;
            letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px;
        }
        .pill-green { background: var(--green-dim); color: var(--green); }
        .pill-red { background: var(--red-dim); color: var(--red); }
        .pill-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; animation: blink 2s ease-in-out infinite; }

        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .detail-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px; }
        .detail-box-label { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1px; }
        .detail-box-value { font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 600; color: #ddd; }

        /* --- SEÇÃO DE ALERTAS INTELIGENTES --- */
        .alerts-section { padding: 12px; border-bottom: 1px solid var(--border); }
        .section-header { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
        .section-header svg { width: 12px; height: 12px; stroke: var(--orange); fill: none; stroke-width: 2; }
        .section-title { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        
        .alert-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .alert-info { display: flex; flex-direction: column; }
        .alert-label { font-size: 11px; color: #fff; font-weight: 500; }
        
        /* Toggle Switch Customizado Kappo (Amber) */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; inset: 0;
            background-color: var(--surface3); transition: .3s; border-radius: 18px;
            border: 1px solid var(--border);
        }
        .slider:before {
            position: absolute; content: ""; height: 12px; width: 12px; left: 2px; bottom: 2px;
            background-color: var(--muted); transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--orange-dim); border-color: var(--orange); }
        input:checked + .slider:before { transform: translateX(16px); background-color: var(--orange); box-shadow: 0 0 8px var(--orange); }

        .controls { padding: 12px; border-bottom: 1px solid var(--border); }
        .controls-title { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .ctrl-btn {
            padding: 10px; border: 1px solid var(--border); border-radius: 8px;
            font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .ctrl-btn svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2; }
        .btn-lock { background: var(--red-dim); color: var(--red); border-color: rgba(255,59,59,0.2); }
        .btn-unlock { background: var(--green-dim); color: var(--green); border-color: rgba(0,224,122,0.2); }

        .history { padding: 12px; flex: 1; overflow-y: auto; }
        .history-title { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .hist-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .hist-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--surface3); border: 2px solid var(--muted); flex-shrink: 0; }
        .hist-dot.recent { border-color: var(--orange); background: var(--orange-dim); }
        .hist-name { font-size: 11px; color: var(--muted2); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .hist-time { font-size: 9px; color: var(--muted); font-family: 'Rajdhani', sans-serif; }

        .map-area { flex: 1; position: relative; overflow: hidden; }
        #map { position: absolute; inset: 0; z-index: 1; }

        .lock-overlay {
            position: absolute; inset: 0; z-index: 5; background: rgba(40,0,0,0.55);
            display: none; align-items: center; justify-content: center;
            flex-direction: column; gap: 16px; text-align: center; backdrop-filter: grayscale(0.5) sepia(0.3);
        }
        .lock-overlay.visible { display: flex; }
        
        .speed-widget {
            position: absolute; top: 12px; right: 12px; z-index: 10;
            background: rgba(17,17,20,0.92); border: 1px solid var(--border2);
            border-radius: 14px; padding: 12px 16px; min-width: 120px;
            backdrop-filter: blur(16px); text-align: center;
        }
        .speed-value { font-family: 'Rajdhani', sans-serif; font-size: 30px; font-weight: 700; color: var(--orange); line-height: 1; }

        .mobile-bottombar {
            display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
            background: rgba(17,17,20,0.95); border-top: 1px solid var(--border);
            padding: 8px 12px; gap: 8px; backdrop-filter: blur(16px);
        }
        @media(max-width:899px){ .mobile-bottombar { display: flex; } }
        .mbb-speed-val { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--orange); }

        /* Estilo para Marcador Pulsante em Alerta */
        .pulsing-marker {
            width: 16px; height: 16px; border-radius: 50%;
            background: var(--red); border: 2px solid #fff;
            box-shadow: 0 0 0 rgba(255, 59, 59, 0.4);
            animation: pulse-red-map 1.5s infinite;
        }
        @keyframes pulse-red-map { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(255, 59, 59, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 59, 59, 0); } }
    </style>
</head>
<body id="mainBody">

    <nav class="topnav">
        <button class="nav-btn menu-btn" onclick="toggleSidebar()">
            <svg viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <div class="topnav-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <div>
                <div class="brand-name">Kappo</div>
                <div class="brand-sub">Tracking System</div>
            </div>
        </div>
        <div class="topnav-spacer"></div>
        <div class="nav-status" id="navStatus">
            <div class="status-dot" id="navDot"></div>
            <span class="status-label" id="navLabel">Sincronizando...</span>
        </div>
        <button class="nav-btn" onclick="logout()">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
    </nav>

    <div class="layout">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

        <aside class="sidebar" id="sidebar">
            <div class="bike-card">
                <div class="bike-photo">
                    <div class="bike-badge">ST-901 4G</div>
                </div>
                <div class="bike-name" id="vehicleName">Carregando...</div>
                <div class="pill pill-green" id="statusPill">
                    <div class="pill-dot"></div>Monitoramento Ativo
                </div>
                <div class="detail-grid">
                    <div class="detail-box"><div class="detail-box-label">HW</div><div class="detail-box-value">ST-901</div></div>
                    <div class="detail-box"><div class="detail-box-label">Bat</div><div class="detail-box-value" id="sideBatery">-%</div></div>
                </div>
            </div>

            <div class="alerts-section">
                <div class="section-header">
                    <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    <div class="section-title">Alertas Inteligentes</div>
                </div>
                
                <div class="alert-row">
                    <span class="alert-label">Cerca Eletrônica</span>
                    <label class="switch">
                        <input type="checkbox" id="alert-geofence" onchange="toggleAlert('geofence', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="alert-row">
                    <span class="alert-label">Alerta de Ignição (ACC)</span>
                    <label class="switch">
                        <input type="checkbox" id="alert-ignition" onchange="toggleAlert('ignition', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="alert-row">
                    <span class="alert-label">Vibração/Choque</span>
                    <label class="switch">
                        <input type="checkbox" id="alert-vibration" onchange="toggleAlert('vibration', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="alert-row">
                    <span class="alert-label">Corte de Energia</span>
                    <label class="switch">
                        <input type="checkbox" id="alert-power" onchange="toggleAlert('power', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="controls">
                <div class="controls-title">Controles Remotos</div>
                <div class="btn-row">
                    <button class="ctrl-btn btn-lock" onclick="sendCommandToBike('engineStop')">
                        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Bloquear
                    </button>
                    <button class="ctrl-btn btn-unlock" onclick="sendCommandToBike('engineResume')">
                        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>Liberar
                    </button>
                </div>
            </div>

            <div class="history">
                <div class="history-title">🕒 Últimos Registros</div>
                <div id="historyList">Carregando...</div>
            </div>
        </aside>

        <div class="map-area">
            <div id="map"></div>
            <div class="lock-overlay" id="lockOverlay">
                <div class="lock-title" style="color:var(--red); font-weight:700;">MOTOR BLOQUEADO</div>
            </div>
            <div class="speed-widget">
                <div class="speed-value" id="speedVal">0</div>
                <div style="font-size:10px; color:var(--muted2);">km/h</div>
            </div>
        </div>
    </div>

    <div class="mobile-bottombar">
        <div class="mbb-speed-val" id="mbbSpeed">0 km/h</div>
        <button class="ctrl-btn btn-lock" style="padding: 8px 15px;" onclick="sendCommandToBike('engineStop')">🔒</button>
        <button class="ctrl-btn btn-unlock" style="padding: 8px 15px;" onclick="sendCommandToBike('engineResume')">🔓</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const TRACCAR_URL = 'https://api.kappotracking.com.br'; 
        let deviceId = null;
        let isAlerting = false;

        const loggedUser = JSON.parse(localStorage.getItem('kappo_user'));
        if (!loggedUser) window.location.href = 'index.html';

        function logout() { localStorage.removeItem('kappo_user'); window.location.href = 'index.html'; }

        function getAuthHeaders() {
            return {
                'Authorization': `Basic ${btoa(loggedUser.email + ':kappo123')}`,
                'Content-Type': 'application/json'
            };
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
            document.getElementById('sidebarOverlay').classList.toggle('visible');
            setTimeout(() => map.invalidateSize(), 400);
        }

        var map = L.map('map', { zoomControl: false }).setView([-23.4332, -45.0711], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        function makeIcon(color, alerting = false) {
            const className = alerting ? 'pulsing-marker' : '';
            const html = alerting ? '' : `<div style="width:16px; height:16px; border-radius:50%; background:${color}; border:2px solid #fff; box-shadow: 0 0 15px ${color};"></div>`;
            return L.divIcon({ className: className, html: html, iconSize: [16, 16], iconAnchor: [8, 8] });
        }

        var marker = L.marker([-23.4332, -45.0711], { icon: makeIcon('#FF8C00') }).addTo(map);

        async function fetchSystemData() {
            try {
                const headers = getAuthHeaders();
                const devRes = await fetch(`${TRACCAR_URL}/api/devices`, { headers });
                const devices = await devRes.json();
                if (devices.length === 0) return;

                const dev = devices[0];
                deviceId = dev.id;
                document.getElementById('vehicleName').textContent = dev.name;

                const posRes = await fetch(`${TRACCAR_URL}/api/positions?deviceId=${deviceId}`, { headers });
                const positions = await posRes.json();

                if (positions.length > 0) {
                    const pos = positions[positions.length - 1];
                    const latlng = [pos.latitude, pos.longitude];
                    marker.setLatLng(latlng);
                    
                    const speed = Math.round(pos.speed * 1.852);
                    document.getElementById('speedVal').textContent = speed;
                    document.getElementById('mbbSpeed').textContent = speed + ' km/h';

                    // Lógica de Alerta Visual (Se houver evento de alarme no backend)
                    if (pos.attributes.alarm) {
                        setVisualAlert(true);
                    } else {
                        setVisualAlert(false);
                    }

                    if (pos.attributes.batteryLevel) document.getElementById('sideBatery').textContent = pos.attributes.batteryLevel + '%';
                }
                document.getElementById('navLabel').textContent = 'Conectado';
            } catch (e) { document.getElementById('navLabel').textContent = 'Erro de Rede'; }
        }

        function setVisualAlert(active) {
            isAlerting = active;
            const navDot = document.getElementById('navDot');
            if (active) {
                navDot.classList.add('alert-active');
                marker.setIcon(makeIcon('#FF3B3B', true)); // Marcador pulsante vermelho
            } else {
                navDot.classList.remove('alert-active');
                marker.setIcon(makeIcon('#FF8C00', false));
            }
        }

        // FUNÇÃO QUE ENVIA COMANDOS DOS BOTÕES DE ALERTA
        async function toggleAlert(type, status) {
            if (!deviceId) return;
            
            // Mapeamento de comandos para o Traccar/SinoTrack
            let commandType = "";
            if (type === 'geofence') commandType = status ? "custom" : "custom"; // Para ST-901 comandos SMS via GPRS
            
            console.log(`Enviando alerta ${type}: ${status ? 'ON' : 'OFF'}`);
            
            // Aqui enviamos o comando de ativação para o hardware via Traccar
            // Nota: Para SinoTrack, comandos de braço/desarme variam conforme a configuração.
            try {
                const headers = getAuthHeaders();
                await fetch(`${TRACCAR_URL}/api/commands/send`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({
                        deviceId: deviceId,
                        type: "custom",
                        attributes: { data: status ? `ARM` : `DISARM` } // Exemplo de comando SMS via GPRS
                    })
                });
            } catch (e) { console.error("Erro ao configurar alerta"); }
        }

        async function sendCommandToBike(type) {
            if (!deviceId) return;
            const isLock = type === 'engineStop';
            document.getElementById('lockOverlay').style.display = isLock ? 'flex' : 'none';
            document.getElementById('statusPill').className = isLock ? 'pill pill-red' : 'pill pill-green';
            document.getElementById('statusPill').innerHTML = isLock ? '<div class="pill-dot"></div>Motor Bloqueado' : '<div class="pill-dot"></div>Monitoramento Ativo';

            try {
                await fetch(`${TRACCAR_URL}/api/commands/send`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ deviceId: deviceId, type: type })
                });
            } catch (e) { alert("Erro ao enviar comando"); }
        }

        setInterval(fetchSystemData, 4000);
        fetchSystemData();
    </script>
</body>
</html>
