<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Real-Time | Kappo Tracking</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body {
            background-color: #121212;
            color: #FFFFFF;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* Barra Lateral */
        .sidebar {
            width: 320px;
            background-color: #1E1E1E;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 1000; /* Fica por cima do mapa */
        }
        .sidebar h2 { color: #FF8C00; font-size: 18px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        
        .bike-card {
            background: #2D2D2D;
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid #FF8C00;
            margin-bottom: 20px;
        }
        .status { color: #00FF00; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        
        /* Área do Mapa - Agora ocupa a tela toda atrás da sidebar */
        #map {
            flex-grow: 1;
            height: 100vh;
            background: #1a1a1a;
        }

        .overlay-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 30, 0.9);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid #444;
            width: 200px;
            z-index: 1000;
        }
        .btn-alert {
            background: #FF8C00;
            color: black;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Kappo Tracking</h2>
        
        <div class="bike-card">
            <div class="status">● MONITORANDO AGORA</div>
            <strong>E-Bike #01 - Karice</strong>
            <p style="font-size: 12px; color: #aaa; margin: 5px 0;">ID: 7654321</p>
        </div>

        <div style="margin-top: auto; color: #555; font-size: 11px; text-align: center;">
            <p>Ubatuba, SP - 2026</p>
            <p>Conectado ao Traccar Custom</p>
        </div>
    </div>

    <div id="map"></div>

    <div class="overlay-info">
        <div style="font-size: 12px; color: #888; margin-bottom: 10px;">TELEMETRIA</div>
        <div id="speed" style="font-size: 16px; margin-bottom: 8px;">🚀 <strong>0 km/h</strong></div>
        <div id="battery" style="font-size: 16px;">🔋 <strong>-- %</strong></div>
        <button class="btn-alert" onclick="enviarBloqueio()">BLOQUEAR MOTOR</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Inicializar o mapa focado em Ubatuba
        // Coordenadas de Ubatuba: -23.4332, -45.0711
        var map = L.map('map').setView([-23.4332, -45.0711], 14);

        // 2. Adicionar o visual do mapa (Estilo Dark para combinar com a Kappo)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 3. Adicionar um marcador (representando a sua E-bike)
        var bikeMarker = L.marker([-23.4332, -45.0711]).addTo(map)
            .bindPopup('<b>Kappo Tracking</b><br>Sua E-Bike está aqui.')
            .openPopup();

        // Função do botão de bloqueio (Marketing: passa segurança para o cliente)
        function enviarBloqueio() {
            const confirmar = confirm("Deseja enviar o comando de BLOQUEIO para o ST-901?");
            if(confirmar) {
                alert("Comando enviado com sucesso via protocolo H02!");
            }
        }
    </script>
</body>
</html>
