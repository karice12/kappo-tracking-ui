<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Kappo Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --orange: #FF8C00;
            --orange-dim: rgba(255,140,0,0.12);
            --red: #FF3B3B;
            --bg: #0C0C0E;
            --surface: #111114;
            --surface2: #18181D;
            --border: rgba(255,255,255,0.06);
            --text: #FFFFFF;
            --muted: #5A5A6E;
            --sidebar-w: 300px;
        }

        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Topnav */
        .topnav { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 1000; }
        .brand { font-family: 'Rajdhani', sans-serif; font-weight: 700; color: var(--orange); text-transform: uppercase; letter-spacing: 2px; }

        .layout { flex: 1; display: flex; position: relative; overflow: hidden; }

        /* Sidebar com Scroll */
        .sidebar { 
            width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; overflow-y: auto; z-index: 900;
            transition: transform 0.3s ease;
        }
        .sidebar.closed { transform: translateX(-100%); position: absolute; }

        /* Seções da Sidebar */
        .section-title { padding: 15px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); background: var(--surface2); }
        
        /* Filtro de Histórico */
        .history-filter { padding: 15px; border-bottom: 1px solid var(--border); }
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 4px; }
        .input-group input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 6px; font-size: 12px; }
        
        .btn-search { 
            width: 100%; background: var(--orange); color: #000; border: none; padding: 10px; 
            border-radius: 6px; font-weight: 700; font-family: 'Rajdhani'; cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-search:hover { opacity: 0.9; }

        /* Lista de Pontos do Histórico */
        #historyItems { flex: 1; }
        .history-item { 
            padding: 12px 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s;
        }
        .history-item:hover { background: var(--orange-dim); }
        .history-item-time { font-weight: 700; font-size: 12px; color: var(--orange); margin-bottom: 2px; }
        .history-item-addr { font-size: 11px; color: var(--muted); }

        /* Mapa */
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; width: 100%; }

        /* Estilo da Linha do Histórico */
        .history-line { filter: drop-shadow(0 0 5px var(--orange)); }

        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; height: 50%; bottom: 0; transform: translateY(0); border-right: none; border-top: 1px solid var(--border); }
            .sidebar.closed { transform: translateY(100%); }
        }
    </style>
</head>
<body>

    <nav class="topnav">
        <div class="brand">Kappo Tracking</div>
        <div style="flex:1"></div>
        <div id="connectionStatus" style="font-size: 10px; color: var(--muted);">● SISTEMA ONLINE</div>
    </nav>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="section-title">Filtro de Percurso</div>
            <div class="history-filter">
                <div class="input-group">
                    <label>Início</label>
                    <input type="datetime-local" id="dateFrom">
                </div>
                <div class="input-group">
                    <label>Fim</label>
                    <input type="datetime-local" id="dateTo">
                </div>
                <button class="btn-search" onclick="loadHistory()">Visualizar Rota</button>
            </div>

            <div class="section-title">Pontos da Rota</div>
            <div id="historyItems">
                <div style="padding: 20px; text-align: center; color: var(--muted); font-size: 12px;">
                    Selecione um período para ver o trajeto.
                </div>
            </div>
        </aside>

        <main class="map-container">
            <div id="map"></div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const TRACCAR_URL = 'https://api.kappotracking.com.br';
        let map, marker, routeLine;
        let deviceId = null;

        // Recuperar dados do usuário (Karice, certifique-se que o login salva isso)
        const user = JSON.parse(localStorage.getItem('kappo_user'));
        const auth = 'Basic ' + btoa(user.email + ':kappo123');

        // Inicializar Mapa
        map = L.map('map', { zoomControl: false }).setView([-23.4332, -45.0711], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Definir ícone Amber (Kappo)
        const kappoIcon = L.divIcon({
            className: 'custom-div-icon',
            html: `<div style="background-color: var(--orange); width: 12px; height: 12px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 10px var(--orange);"></div>`,
            iconSize: [12, 12], iconAnchor: [6, 6]
        });

        async function init() {
            try {
                const res = await fetch(`${TRACCAR_URL}/api/devices`, { headers: { 'Authorization': auth } });
                const devices = await res.json();
                if (devices.length > 0) {
                    deviceId = devices[0].id;
                    fetchLiveLocation();
                }
            } catch (e) { console.error("Erro na conexão"); }
        }

        // Localização em Tempo Real
        async function fetchLiveLocation() {
            const res = await fetch(`${TRACCAR_URL}/api/positions?deviceId=${deviceId}`, { headers: { 'Authorization': auth } });
            const data = await res.json();
            if (data.length > 0) {
                const pos = data[0];
                const latlng = [pos.latitude, pos.longitude];
                if (!marker) {
                    marker = L.marker(latlng, { icon: kappoIcon }).addTo(map);
                } else {
                    marker.setLatLng(latlng);
                }
                if (!routeLine) map.panTo(latlng);
            }
            setTimeout(fetchLiveLocation, 5000);
        }

        // --- FUNÇÃO DE HISTÓRICO ---
        async function loadHistory() {
            const from = new Date(document.getElementById('dateFrom').value).toISOString();
            const to = new Date(document.getElementById('dateTo').value).toISOString();
            
            const btn = document.querySelector('.btn-search');
            btn.textContent = "Buscando...";

            try {
                const url = `${TRACCAR_URL}/api/positions?deviceId=${deviceId}&from=${from}&to=${to}`;
                const res = await fetch(url, { headers: { 'Authorization': auth } });
                const positions = await res.json();

                if (positions.length === 0) {
                    alert("Nenhuma rota encontrada neste período.");
                    return;
                }

                // Limpar rota anterior se existir
                if (routeLine) map.removeLayer(routeLine);

                const pathCoords = positions.map(p => [p.latitude, p.longitude]);
                
                // Desenhar a linha no mapa (Cor Laranja Kappo)
                routeLine = L.polyline(pathCoords, {
                    color: '#FF8C00',
                    weight: 4,
                    opacity: 0.8,
                    className: 'history-line'
                }).addTo(map);

                // Ajustar o zoom para ver a rota toda
                map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });

                // Renderizar lista na Sidebar
                renderHistoryList(positions);

            } catch (e) {
                alert("Erro ao buscar histórico.");
            } finally {
                btn.textContent = "Visualizar Rota";
            }
        }

        function renderHistoryList(positions) {
            const container = document.getElementById('historyItems');
            container.innerHTML = '';

            // Mostrar apenas as 20 últimas posições para não travar a UI
            positions.slice(-20).reverse().forEach(p => {
                const time = new Date(p.deviceTime).toLocaleString('pt-BR');
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <div class="history-item-time">${time}</div>
                    <div class="history-item-addr">Velocidade: ${Math.round(p.speed * 1.852)} km/h</div>
                `;
                div.onclick = () => map.setView([p.latitude, p.longitude], 17);
                container.appendChild(div);
            });
        }

        // Setar datas padrão (Hoje)
        const now = new Date();
        const today = now.toISOString().slice(0, 16);
        now.setHours(0,0,0,0);
        const start = now.toISOString().slice(0, 16);
        document.getElementById('dateFrom').value = start;
        document.getElementById('dateTo').value = today;

        init();
    </script>
</body>
</html>
