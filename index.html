<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Impede o recarregamento imediato
        
        const btn = e.target.querySelector('button');
        const originalText = btn.innerText;
        
        // Efeito de Marketing: Simulando Verificação
        btn.innerText = "VERIFICANDO ACESSO...";
        btn.style.opacity = "0.7";
        btn.disabled = true;

        // Espera 1.5 segundos antes de mudar de página
        setTimeout(() => {
            // Redireciona para o Dashboard que criamos
            window.location.href = "dashboard.html";
        }, 1500);
    });
</script>
