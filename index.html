<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kappo Tracking Ubatuba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configuração rápida de cores customizadas para a Kappo
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kappoMain: '#00e054', // Um verde/neon para detalhes
                        kappoDark: '#111827', // Fundo quase preto
                        kappoCard: '#1f2937'  // Fundo dos cards (cinza escuro)
                    }
                }
            }
        }
    </script>
    <style>
        /* Um pequeno ajuste para garantir que o fundo ocupe a tela toda */
        body { background-color: #111827; }
    </style>
</head>
<body class="text-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-kappoCard p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
        
        <div class="text-center mb-10">
            <div class="inline-block p-4 rounded-full bg-gray-700/50 mb-4 border border-kappoMain/30">
                <span class="text-5xl">📡</span>
            </div>
            <h1 class="text-4xl font-extrabold text-white tracking-tighter">
                Kappo<span class="text-kappoMain">Tracking</span>
            </div>
            </h1>
            <p class="text-gray-400 mt-2 text-sm">Segurança veicular em Ubatuba</p>
        </div>

        <form id="loginForm" class="space-y-6">
            
            <div>
                <label for="email" class="block text-sm font-medium text-gray-300 mb-1">E-mail do Cliente</label>
                <input type="email" id="email" name="email" required
                    class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-700 text-white placeholder-gray-500 focus:ring-2 focus:ring-kappoMain focus:border-kappoMain outline-none transition duration-150"
                    placeholder="exemplo@email.com">
            </div>

            <div>
                <div class="flex items-center justify-between mb-1">
                    <label for="password" class="block text-sm font-medium text-gray-300">Senha Segura</label>
                    <a href="#" class="text-xs text-kappoMain hover:underline">Esqueceu a senha?</a>
                </div>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-700 text-white placeholder-gray-500 focus:ring-2 focus:ring-kappoMain focus:border-kappoMain outline-none transition duration-150"
                    placeholder="••••••••">
            </div>

            <div>
                <button type="submit"
                    class="w-full bg-kappoMain text-gray-900 font-bold py-3 px-6 rounded-xl hover:bg-green-400 transform hover:scale-[1.02] transition duration-150 shadow-lg shadow-kappoMain/20">
                    Acessar Meu Veículo
                </button>
            </div>
        </form>

            <div class="mt-10 text-center text-xs text-gray-500 space-y-2">
            <p>Precisa de ajuda ou instalação? <a href="#" class="text-kappoMain hover:underline">Fale com o Suporte Kappo</a></p>
            <p class="border-t border-gray-800 pt-3">&copy; 2026 Kappo Tracking - Ubatuba/SP. Proteção com tecnologia SinoTrack.</p>
        </div>

    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Impede a página de recarregar
            alert('Excelente, Chefe! O formulário de login foi criado. No próximo passo, vamos configurar o JavaScript para conectar isso ao servidor Traccar!');
        });
    </script>

</body>
</html>
