<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kappo Tracking | E-bike Security</title>
    <style>
        body {
            background-color: #121212; /* Stealth Gray Fundo */
            color: #FFFFFF;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: #1E1E1E;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            text-align: center;
            border-top: 5px solid #FF8C00; /* Nosso Laranja */
            width: 320px;
        }
        h1 { color: #FF8C00; margin-bottom: 5px; font-size: 24px; }
        p { color: #B0B0B0; font-size: 14px; margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2D2D2D;
            border: 1px solid #454545;
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #FF8C00;
            border: none;
            border-radius: 5px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        button:hover { background-color: #E67E00; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Kappo Tracking</h1>
        <p>Monitoramento Inteligente de E-bikes em Ubatuba</p>
        <input type="text" placeholder="Usuário">
        <input type="password" placeholder="Senha">
        <button>Entrar no Sistema</button>
    </div>
</body>
</html>
