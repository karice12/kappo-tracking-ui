<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kappo Tracking | Monitoramento Inteligente de E-bikes em Ubatuba</title>
    <style>
        body {
            /* Fundo com imagem temática de Ubatuba (Ponte/Mar) */
            background: linear-gradient(rgba(18, 18, 18, 0.85), rgba(18, 18, 18, 0.9)), 
                        url('https://images.unsplash.com/photo-1590518664177-f273b06950b4?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #FFFFFF;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: rgba(30, 30, 30, 0.96); /* Vidro fosco premium */
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
            border-top: 8px solid #FF8C00; /* Nosso Laranja Stealth */
            width: 360px;
            backdrop-filter: blur(8px);
        }
        /* Espaço reservado para o NOVO LOGO */
        .logo-placeholder {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #252525;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px auto;
            border: 3px solid #FF8C00;
            color: #FF8C00;
            font-size: 32px;
            font-weight: bold;
            text-transform: uppercase;
        }
        h1 { 
            color: #FF8C00; 
            margin-bottom: 5px; 
            font-size: 26px; 
            letter-spacing: -1px;
            text-transform: uppercase;
            font-weight: 800;
        }
        p { color: #B0B0B0; font-size: 14px; margin-bottom: 35px; line-height: 1.5; font-weight: 400; }
        input {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            background: #2A2A2A;
            border: 1px solid #404040;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #FF8C00; background: #333; }
        button {
            width: 100%;
            padding: 16px;
            background-color: #FF8C00;
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: 900;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover { 
            background-color: #FFA500; 
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.5);
        }
        .footer-text {
            margin-top: 30px;
            font-size: 11px;
            color: #555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-placeholder">K</div>
        
        <p>Acesse o painel de controle e segurança da sua e-bike.<br><strong>Monitoramento em Tempo Real • Ubatuba SP</strong></p>
        
        <input type="text" placeholder="Seu e-mail ou usuário">
        <input type="password" placeholder="Sua senha">
        
        <button>Acessar Sistema</button>
        
        <div class="footer-text">© 2026 Kappo Tracking • Tecnologia para Micro-Mobilidade</div>
    </div>
</body>
</html>
