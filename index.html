<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kappo Tracking | E-bike Security</title>
    <style>
        body {
            /* Imagem de fundo temática (Estrada/Tecnologia) */
            background: linear-gradient(rgba(18, 18, 18, 0.8), rgba(18, 18, 18, 0.8)), 
                        url('https://images.unsplash.com/photo-1558981806-ec527fa84c39?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #FFFFFF;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: rgba(30, 30, 30, 0.95); /* Leve transparência para estilo premium */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            text-align: center;
            border-top: 6px solid #FF8C00; /* Nosso Laranja Stealth */
            width: 340px;
            backdrop-filter: blur(5px); /* Efeito de vidro fosco */
        }
        h1 { 
            color: #FF8C00; 
            margin-bottom: 5px; 
            font-size: 28px; 
            letter-spacing: -1px;
            text-transform: uppercase;
        }
        p { color: #B0B0B0; font-size: 13px; margin-bottom: 30px; line-height: 1.4; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #2D2D2D;
            border: 1px solid #454545;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: #FF8C00; }
        button {
            width: 100%;
            padding: 14px;
            background-color: #FF8C00;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        button:hover { 
            background-color: #FFA500; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.4);
        }
        .footer-text {
            margin-top: 25px;
            font-size: 11px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Kappo Tracking</h1>
        <p>Segurança Avançada para sua E-bike<br><strong>Ubatuba • SP</strong></p>
        <input type="text" placeholder="Seu usuário">
        <input type="password" placeholder="Sua senha">
        <button onclick="window.location.href='dashboard.html'">Acessar Monitoramento</button>
        <div class="footer-text">© 2026 Kappo Tracking - Intelligent Security</div>
    </div>
</body>
</html>
