<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kappo Tracking | E-bike Security</title>
    <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Impede o recarregamento imediato
        
        const btn = e.target.querySelector('button');
        const originalText = btn.innerText;
        
        // Efeito de Marketing: Simulando Verificação
        btn.innerText = "VERIFICANDO ACESSO...";
        btn.style.opacity = "0.7";
        btn.disabled = true;

        // Espera 1.5 segundos antes de mudar de página
        setTimeout(() => {
            // Redireciona para o Dashboard que criamos
            window.location.href = "dashboard.html";
        }, 1500);
    });
</script>
</head>
<body>
    <div class="login-card">
        <h1>Kappo Tracking</h1>
        <p>Segurança Avançada para sua E-bike<br><strong>Ubatuba • SP</strong></p>
        <input type="text" placeholder="Seu usuário">
        <input type="password" placeholder="Sua senha">
        <button onclick="window.location.href='dashboard.html'">Acessar Monitoramento</button>
        <div class="footer-text">© 2026 Kappo Tracking - Intelligent Security</div>
    </div>
</body>
</html>
